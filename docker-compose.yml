version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: feishu_clone_db
    environment:
      POSTGRES_USER: feishu_admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: feishu_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feishu_admin -d feishu_core"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: feishu_clone_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    # Placeholder for the Go backend service
    # build: ./backend
    image: golang:1.21-alpine
    container_name: feishu_clone_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    # Keep the container alive for development before we compile the binary
    command: tail -f /dev/null 
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_DSN=postgres://feishu_admin:secretpassword@postgres:5432/feishu_core?sslmode=disable
      - REDIS_URL=redis:6379

volumes:
  postgres_data:
  redis_data:
